<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerador de Senhas Seguras — Enterprise</title>
  
  <style>

    :root {
      --bg-global: #09090b;
      --bg-card: #141416;
      --bg-input: #1d1d21;
      --border-color: #2e2e33;
      --border-focus: #71717a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #e4e4e7;
      
      --success: #22c55e;         
      --warning: #eab308;         
      --danger: #ef4444;          
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-global);
      color: var(--text-main);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      background: var(--bg-card);
      padding: 2.5rem;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      max-width: 440px;
      width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      margin-bottom: 1.5rem;
    }

    .label-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      display: block;
      margin-bottom: 0.75rem;
    }

    .length-selector {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.25rem;
      margin-bottom: 1.5rem;
      gap: 0.25rem;
    }

    .length-selector button {
      background: transparent;
      border: none;
      color: var(--text-main);
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .length-selector button:hover {
      background: var(--border-color);
      color: var(--text-main);
    }

    .length-selector input {
      flex-grow: 1;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      pointer-events: none;
    }

    fieldset {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    legend {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 0.5rem;
      font-weight: 700;
      color: var(--text-muted); 
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      margin-bottom: 0.85rem;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-main);
      user-select: none;
      transition: color 0.2s;
    }

    .checkbox-label:last-child {
      margin-bottom: 0;
    }

    .checkbox-label:hover {
      color: #ffffff;
    }

    .checkbox-label input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-input);
      margin-right: 0.75rem;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .checkbox-label input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-label input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 4px;
      height: 9px;
      border: solid var(--bg-global);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    #generateBtn {
      width: 100%;
      background: var(--text-main);
      color: var(--bg-global);
      font-weight: 700;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    #generateBtn:hover {
      background: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    /* CAMPO DE SAÍDA DA SENHA */
    .password-wrapper {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.25rem;
      margin-top: 0.5rem;
      transition: border-color 0.3s;
    }

    .password-wrapper:focus-within {
      border-color: var(--border-focus); /* Foco neutro */
    }

    #password {
      flex-grow: 1;
      padding: 0.6rem 0.75rem;
      font-size: 1.2rem;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      border: none;
      background: transparent;
      color: var(--text-main);
      outline: none;
      letter-spacing: 1.5px;
    }

    .password-wrapper button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .password-wrapper button:hover {
      background: var(--border-color);
      color: var(--text-main);
    }

    /* MEDIDOR DE FORÇA DA SENHA */
    #strengthMeter {
      height: 5px;
      width: 100%;
      background: #222226;
      border-radius: 10px;
      margin-top: 1rem;
      overflow: hidden;
    }

    #strengthMeter > div {
      height: 100%;
      width: 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #strengthText {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      color: var(--text-muted);
      white-space: pre-line;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <main class="container">
    <h1>Gerador de Senhas Seguras</h1>

    <section class="controls">
      <span class="label-title">Tamanho da senha</span>
      <div class="length-selector">
        <button id="decreaseLength" type="button" aria-label="Diminuir tamanho">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <input type="number" id="length" value="12" min="4" max="64" readonly />
        <button id="increaseLength" type="button" aria-label="Aumentar tamanho">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>

      <fieldset>
        <legend>Configurações de Caracteres</legend>
        <label class="checkbox-label"><input type="checkbox" id="includeUppercase" checked /> Letras Maiúsculas (A-Z)</label>
        <label class="checkbox-label"><input type="checkbox" id="includeLowercase" checked /> Letras Minúsculas (a-z)</label>
        <label class="checkbox-label"><input type="checkbox" id="includeNumbers" checked /> Números (0-9)</label>
        <label class="checkbox-label"><input type="checkbox" id="includeSymbols" /> Símbolos (!@#$%)</label>
      </fieldset>

      <button id="generateBtn" type="button">Gerar Nova Senha</button>
    </section>

    <section class="output">
      <span class="label-title">Senha Gerada / Testada</span>
      <div class="password-wrapper">
        <input type="password" id="password" aria-live="polite" aria-atomic="true" placeholder="Digite ou gere uma senha..." />
        
        <button id="toggleVisibility" type="button" aria-label="Mostrar/ocultar senha">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="20" height="20">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>

        <button id="copyBtn" type="button" aria-label="Copiar senha">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
      <div id="strengthMeter" aria-hidden="true"></div>
      <p id="strengthText" aria-live="polite"></p>
    </section>
  </main>

  <script>
    /* === LÓGICA DE GERAÇÃO E SEGURANÇA === */
    document.addEventListener('DOMContentLoaded', function() {
      const lengthInput = document.getElementById('length');
      const decreaseBtn = document.getElementById('decreaseLength');
      const increaseBtn = document.getElementById('increaseLength');
      const includeUppercase = document.getElementById('includeUppercase');
      const includeLowercase = document.getElementById('includeLowercase');
      const includeNumbers = document.getElementById('includeNumbers');
      const includeSymbols = document.getElementById('includeSymbols');
      const generateBtn = document.getElementById('generateBtn');
      const passwordOutput = document.getElementById('password');
      const toggleVisibilityBtn = document.getElementById('toggleVisibility');
      const eyeIcon = document.getElementById('eyeIcon');
      const strengthMeter = document.getElementById('strengthMeter');
      const strengthText = document.getElementById('strengthText');
      const copyBtn = document.getElementById('copyBtn');

      let passwordVisible = false;
      const CHAR_SETS = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?/~'
      };

      decreaseBtn.addEventListener('click', () => {
        let value = Math.max(4, Number(lengthInput.value) - 1);
        lengthInput.value = value;
        generatePassword();
      });

      increaseBtn.addEventListener('click', () => {
        let value = Math.min(64, Number(lengthInput.value) + 1);
        lengthInput.value = value;
        generatePassword();
      });

      [includeUppercase, includeLowercase, includeNumbers, includeSymbols].forEach(cb => {
        cb.addEventListener('change', generatePassword);
      });

      generateBtn.addEventListener('click', generatePassword);

      toggleVisibilityBtn.addEventListener('click', () => {
        passwordVisible = !passwordVisible;
        passwordOutput.type = passwordVisible ? 'text' : 'password';
        
        if (passwordVisible) {
          eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        } else {
          eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
        }
      });

      copyBtn.addEventListener('click', () => {
        const senha = passwordOutput.value;
        if (senha) {
          navigator.clipboard.writeText(senha).then(() => {
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => copyBtn.innerHTML = originalIcon, 1500);
          });
        }
      });

      passwordOutput.addEventListener('input', () => {
        const password = passwordOutput.value;
        let poolSize = 0;

        if (/[A-Z]/.test(password)) poolSize += CHAR_SETS.uppercase.length;
        if (/[a-z]/.test(password)) poolSize += CHAR_SETS.lowercase.length;
        if (/[0-9]/.test(password)) poolSize += CHAR_SETS.numbers.length;
        if (/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?/~]/.test(password)) poolSize += CHAR_SETS.symbols.length;

        lengthInput.value = password.length;
        updateStrength(password, poolSize);
      });

      function generatePassword() {
        let length = Number(lengthInput.value);
        let charPool = '';
        if (includeUppercase.checked) charPool += CHAR_SETS.uppercase;
        if (includeLowercase.checked) charPool += CHAR_SETS.lowercase;
        if (includeNumbers.checked) charPool += CHAR_SETS.numbers;
        if (includeSymbols.checked) charPool += CHAR_SETS.symbols;
        
        if (!charPool) {
          passwordOutput.value = '';
          updateStrength('', 0);
          return;
        }

        let password = '';
        let guaranteed = [];
        if (includeUppercase.checked) guaranteed.push(randomChar(CHAR_SETS.uppercase));
        if (includeLowercase.checked) guaranteed.push(randomChar(CHAR_SETS.lowercase));
        if (includeNumbers.checked) guaranteed.push(randomChar(CHAR_SETS.numbers));
        if (includeSymbols.checked) guaranteed.push(randomChar(CHAR_SETS.symbols));
        
        for (let i = 0; i < length; i++) {
          password += randomChar(charPool);
        }
        
        let finalPasswordArray = guaranteed.concat(password.slice(guaranteed.length));
        
        for (let i = finalPasswordArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [finalPasswordArray[i], finalPasswordArray[j]] = [finalPasswordArray[j], finalPasswordArray[i]];
        }

        password = finalPasswordArray.join('');
        passwordOutput.value = password;
        updateStrength(password, charPool.length);
      }

      function randomChar(str) {
        return str[Math.floor(Math.random() * str.length)];
      }

      function calculateEntropy(passwordLength, poolSize) {
        if (!passwordLength || !poolSize) return 0;
        return passwordLength * Math.log2(poolSize);
      }

      function updateStrength(password, poolSize) {
        let entropy = calculateEntropy(password.length, poolSize);
        let pct = Math.min(entropy / 100, 1) * 100;
        
        let color = 'var(--success)';
        if (entropy < 40) color = 'var(--danger)';
        else if (entropy < 70) color = 'var(--warning)';
        
        strengthMeter.innerHTML = `<div style="width:${pct}%; background:${color}; height:100%"></div>`;
        
        if (!password) {
          strengthText.textContent = '';
        } else {
          strengthText.innerHTML = 
            `Entropia: <strong style="color: ${color}">${entropy.toFixed(1)} bits</strong> — ${getEntropyDescription(entropy)}<br>` +
            `<span style="font-size: 0.8rem; color: var(--text-muted)">Tempo estimado para quebra: ${estimateCrackTime(entropy)}</span>`;
        }
      }

      function getEntropyDescription(entropy) {
        if (entropy < 40) return "Senha Vulnerável";
        if (entropy < 70) return "Senha Aceitável";
        return "Fortaleza Criptográfica";
      }

      function estimateCrackTime(entropy) {
        const seconds = Math.pow(2, entropy) / 1e9;
        const years = seconds / (60 * 60 * 24 * 365);
        if (years < 1 / 365) return "segundos";
        if (years < 1) return `${(years * 365).toFixed(0)} dias`;
        if (years > 1e9) return "bilhões de anos";
        return `${years.toFixed(1)} anos`;
      }

      generatePassword();
    });
  </script>
</body>
</html>
